<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 600" width="1800" height="600" role="img" aria-labelledby="title desc">
  <title id="title">Localoaf wordmark logo</title>
  <desc id="desc">Typographic Localoaf logo in terracotta on warm cream background, with the o in loaf replaced by a round artisan bread with scored cross pattern.</desc>

  <rect width="1800" height="600" fill="#F5F0E8"/>

  <defs>
    <style>
      .word {
        fill: #C75D3E;
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 250px;
        font-weight: 400;
        letter-spacing: -12px;
      }
      .bread-stroke {
        stroke: #C75D3E;
        stroke-width: 9;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }
      .bread-fill {
        fill: #F5F0E8;
        stroke: #C75D3E;
        stroke-width: 8;
      }
      .crumb {
        fill: #C75D3E;
        opacity: 0.9;
      }
    </style>
  </defs>

  <!-- Wordmark split to replace the second 'o' in Loaf with bread -->
  <text class="word" x="120" y="380">Local</text>

  <!-- Round artisan bread replacing the 'o' in loaf -->
  <g transform="translate(1092 283)">
    <circle class="bread-fill" cx="0" cy="0" r="76"/>

    <!-- Greñado / scored cross pattern -->
    <path class="bread-stroke" d="M -48 -40 C -20 -20 12 -8 54 -3"/>
    <path class="bread-stroke" d="M -54 28 C -22 6 10 -14 45 -45"/>
    <path class="bread-stroke" d="M -42 -4 C -10 12 18 26 48 42"/>
    <path class="bread-stroke" d="M -8 -58 C -3 -26 8 3 24 30"/>

    <!-- Fine bread texture dots -->
    <circle class="crumb" cx="-42" cy="-22" r="2.2"/>
    <circle class="crumb" cx="-18" cy="-44" r="2"/>
    <circle class="crumb" cx="22" cy="-48" r="1.8"/>
    <circle class="crumb" cx="46" cy="-24" r="2"/>
    <circle class="crumb" cx="-60" cy="4" r="1.8"/>
    <circle class="crumb" cx="-35" cy="18" r="2"/>
    <circle class="crumb" cx="-18" cy="44" r="1.8"/>
    <circle class="crumb" cx="20" cy="48" r="2"/>
    <circle class="crumb" cx="54" cy="16" r="1.8"/>
    <circle class="crumb" cx="2" cy="-22" r="1.7"/>
    <circle class="crumb" cx="18" cy="-2" r="1.6"/>
    <circle class="crumb" cx="-4" cy="26" r="1.7"/>
    <circle class="crumb" cx="36" cy="30" r="1.5"/>
    <circle class="crumb" cx="-52" cy="-48" r="1.5"/>
    <circle class="crumb" cx="58" cy="-44" r="1.5"/>
  </g>

  <text class="word" x="1185" y="380">af</text>
</svg>
