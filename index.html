<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LocaLoaf</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      background: #fff7e8;
      color: #2b1a0f;
      text-align: center;
      padding: 24px;
    }

    .card {
      max-width: 680px;
    }

    h1 {
      font-size: 56px;
      margin-bottom: 16px;
      letter-spacing: -1px;
    }

    p {
      font-size: 22px;
      line-height: 1.5;
      margin: 0 0 24px;
    }

    .tagline {
      font-size: 16px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>LocaLoaf</h1>
    <p>We’re baking something special.</p>
    <p class="tagline">Our new website is coming soon.</p>
  </main>
</body>
</html>
