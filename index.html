<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Localoaf — Coming Soon</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, 'Times New Roman', serif;
      background: #F5F0E8;
      color: #2b1a0f;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 700px;
      width: 100%;
    }
    .logo {
      width: 100%;
      max-width: 560px;
      display: block;
      margin: 0 auto 40px;
    }
    p {
      font-size: 22px;
      line-height: 1.5;
      margin-bottom: 16px;
      color: #C75D3E;
    }
    .tagline {
      font-size: 15px;
      color: #2b1a0f;
      opacity: 0.55;
      font-family: Arial, Helvetica, sans-serif;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <main class="card">
    <img src="logo.png" alt="Localoaf" class="logo" />
    <p>We're baking something special.</p>
    <p class="tagline">Our new website is coming soon.</p>
    <p class="tagline">Copyright 2026.</p>
  </main>
</body>
</html>
